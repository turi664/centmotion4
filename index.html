<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CentMotion • Mental Fitness Tijuana</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .hero-bg { background: linear-gradient(135deg, #2a0a4a 0%, #0f172a 100%); }
        .neon-pink { box-shadow: 0 0 25px #ff00aa, 0 0 45px #ff00aa; }
        .hummingbird { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .hummingbird:hover { transform: scale(1.08) rotate(8deg); filter: brightness(1.15); }
    </style>
</head>
<body class="bg-[#0a051f] text-white overflow-x-hidden">

    <!-- NAV -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-[#0a051f]/95 backdrop-blur-xl border-b border-white/10">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-x-4">
                <img src="/attachments/gpt-image-2_Generate_a_minimalist_professional_isotype_logo_of_a_hummingbird_captured_in_ful-0(1).jpg" 
                     alt="CentMotion" class="h-11 w-auto hummingbird">
                <div class="logo-font text-3xl font-bold tracking-tighter">
                    Cent<span class="text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-cyan-400">Motion</span>
                </div>
            </div>

            <div class="hidden md:flex items-center gap-x-9 text-sm font-medium">
                <a href="#por-que" class="hover:text-pink-400 transition">¿Por qué?</a>
                <a href="#servicios" class="hover:text-pink-400 transition">Servicios</a>
                <a href="#quien" class="hover:text-pink-400 transition">Tu Guía</a>
                <a href="#historias" class="hover:text-pink-400 transition">Historias</a>
            </div>

            <div class="flex items-center gap-x-4">
                <button onclick="toggleLanguage()" class="px-6 py-2.5 rounded-3xl bg-white/10 hover:bg-white/20 border border-white/20 text-sm flex items-center gap-2">
                    🌎 <span id="lang">ES/EN</span>
                </button>
                <a href="#agendar" class="px-8 py-3.5 bg-gradient-to-r from-pink-500 to-fuchsia-500 rounded-3xl font-semibold neon-pink hover:scale-105 transition">
                    Agenda tu Exploración
                </a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero-bg min-h-screen flex items-center pt-20 relative">
        <div class="max-w-screen-2xl mx-auto px-8 grid md:grid-cols-2 gap-12 items-center">
            <div class="space-y-8">
                <h1 class="text-6xl md:text-[4.2rem] leading-none font-bold tracking-tighter logo-font">
                    ENTRAENA TU MENTE.<br>
                    <span class="bg-gradient-to-r from-pink-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">CONQUISTA TU FUTURO.</span>
                </h1>
                <p class="text-xl text-gray-300">Apoyo para niños y adolescentes en Tijuana.<br>Sin estigmas. Solo crecimiento y energía.</p>
                
                <button onclick="openMoodChecker()" 
                        class="px-10 py-6 text-lg font-semibold rounded-3xl bg-gradient-to-r from-pink-500 to-rose-500 hover:scale-105 transition flex items-center gap-3">
                    ⚡ ¿Cómo está tu batería hoy?
                </button>
            </div>

            <div class="relative flex justify-center">
                <img src="/attachments/gpt-image-2_Generate_a_minimalist_professional_isotype_logo_of_a_hummingbird_captured_in_ful-0(1).jpg" 
                     alt="CentMotion Hummingbird" 
                     class="hummingbird w-full max-w-lg drop-shadow-2xl">
            </div>
        </div>

        <!-- Mood Widget -->
        <div id="mood-widget" class="hidden fixed bottom-8 right-8 bg-[#1a1033] border border-pink-500/50 rounded-3xl p-6 w-80">
            <p class="text-sm mb-3">🔋 ¿Cómo está tu batería hoy?</p>
            <input type="range" id="energy" min="1" max="10" value="7" class="w-full accent-pink-500">
            <button onclick="bookSession()" class="mt-6 w-full py-4 bg-emerald-400 text-black font-bold rounded-2xl">RESERVAR SESIÓN</button>
        </div>
    </section>

    <!-- Rest of sections (Why, Services, etc.) follow similar elevated style... -->

    <script>
        function toggleLanguage() {
            const el = document.getElementById('lang');
            el.textContent = el.textContent === 'ES/EN' ? 'EN/ES' : 'ES/EN';
        }
        function openMoodChecker() {
            document.getElementById('mood-widget').classList.toggle('hidden');
        }
        function bookSession() {
            alert("¡Energía detectada! Redirigiendo a Calendly...");
        }
    </script>
</body>
</html>
